name: your_pomodoro
description: "A customizable Pomodoro timer application."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  path_provider: 2.1.2
  local_notifier: 0.1.6
  flutter_local_notifications: 17.2.4
  timezone: 0.9.4
  cupertino_icons: 1.0.8
  rename_app: 1.6.5
  window_manager: 0.5.1
  launch_at_startup: 0.5.1
  tray_manager: 0.5.2
  flutter_launcher_icons: 0.13.1
  shared_preferences: 2.5.5
  universal_io: 2.3.1
  audioplayers: 5.2.1
  file_picker: 8.3.7
  desktop_drop: 0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo.ico
    - assets/tomato(By_AomAm).png
    - assets/tomato(By_AomAm).ico

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0210C9"
    theme_color: "#0210C9"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/logo.png"
  
