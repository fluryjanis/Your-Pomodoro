name: macOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build macos --release
      
      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: Remind-Me-Mac-Build
          path: build/macos/Build/Products/Release/Remind_Me.app
